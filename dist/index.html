async function sbGet(table, params) {

function weekLabel() {
    const now = new Date();
    const day = now.getDay(); // 0=Sun, 1=Mon
    // Always label with the Monday that started the week just ending
    // If today is Sunday (0), go back 6 days to last Monday
    // If today is Monday (1), go back 7 days to previous Monday
    // Any other day, go back (day - 1) days to find this week's Monday, then subtract 7 more
    let daysBack;
    if (day === 0) daysBack = 6;
    else daysBack = day - 1 + 7;
    const prevMonday = new Date(now);

pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function extractPdfText(file) {
    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        const lines = {};
        content.items.forEach(item => {
            const y = Math.round(item.transform[5]);
            if (!lines[y]) lines[y] = [];
            lines[y].push(item.str);
        });
        const sortedY = Object.keys(lines).map(Number).sort((a, b) => b - a);
        fullText += sortedY.map(y => lines[y].join(" ")).join("\n") + "\n";
    }
    return fullText;
}

function parseSalesByItemLines(text) {

    const lineRe = /^(\d{4,9})\s+(.+?)\s+(\d+)\s+([\d,]+\.\d{2})\s+([\d.]+)$/;
    for (const line of text.split("\n")) {
        const m = line.trim().match(lineRe);
        if (m) rows.push({ plu: m[1], name: m[2], qty: parseInt(m[3]) });
    }
    return rows;
}

    }
    return rows;
}

async function parseSpecialtyReport(text, recipeRows, soldAsMap) {
    const rows = parseSalesByItemLines(text);

    for (const r of recipeRows) {
        if (r.tracked !== "Yes") continue;
        if (!recipeMap[r.drink]) recipeMap[r.drink] = [];
        recipeMap[r.drink].push({ ingredient: r.maps_to_master_item, oz: r.oz });

    function addDepletion(ingredient, amount) {

        else ozByItem[ingredient] = (ozByItem[ingredient] || 0) + amount;
    }
    for (const row of rows) {
        if (SPECIALTY_NO_RECIPE.has(row.name)) { flags.push(`"${row.name}" sold ${row.qty}x - NO RECIPE on file`); continue; }
        if (SPECIALTY_STRAIGHT_POUR[row.name]) {

            addDepletion(ingredient, oz * row.qty);

        const drinkName = SPECIALTY_NAME_FIX[row.name] || row.name;
        const recipe = recipeMap[drinkName];
        if (!recipe) { flags.push(`No recipe found for "${row.name}"`); continue; }
        for (const ing of recipe) addDepletion(ing.ingredient, ing.oz * row.qty);
